<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7f6;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    width:700px;
    background:white;
    padding:30px;
    border-radius:8px;
}

h2{
    margin-bottom:20px;
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.form-group{
    flex:1;
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:6px;
    font-size:14px;
}

input, textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

textarea{
    height:120px;
    resize:none;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.radio-box{
    flex:1;
    border:1px solid #ccc;
    padding:12px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:10px;
}

.checkbox{
    margin:20px 0;
}

button{
    width:100%;
    padding:14px;
    background:#1b7f6b;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#166a59;
}
</style>
</head>

<body>

<div class="container">
<h2>Contact Us</h2>

<form>

<div class="form-row">
<div class="form-group">
<label>First Name *</label>
<input type="text">
</div>

<div class="form-group">
<label>Last Name *</label>
<input type="text">
</div>
</div>

<div class="form-group" style="margin-bottom:20px;">
<label>Email Address *</label>
<input type="email">
</div>

<label>Query Type *</label>

<div class="radio-group">
<label class="radio-box">
<input type="radio" name="query">
General Enquiry
</label>

<label class="radio-box">
<input type="radio" name="query">
Support Request
</label>
</div>

<div class="form-group">
<label>Message *</label>
<textarea></textarea>
</div>

<div class="checkbox">
<label>
<input type="checkbox">
I consent to being contacted by the team *
</label>
</div>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
